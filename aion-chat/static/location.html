<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>定位地图 - Aion</title>
<link rel="stylesheet" href="/static/common.css">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff8359">
<style>
.loc-panel-status { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.loc-stat { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:6px 10px; flex:1; min-width:120px; }
.loc-stat-label { display:block; font-size:10px; color:var(--text3); }
.loc-stat-val { font-size:13px; color:var(--text); }
.loc-cfg-section { margin-top:12px; }
.loc-cfg-section h4 { font-size:13px; color:var(--accent); cursor:pointer; padding:6px 0; user-select:none; }
.loc-cfg-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
.loc-cfg-row label { font-size:12px; color:var(--text); display:flex; align-items:center; gap:4px; }
.loc-cfg-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.loc-cfg-grid label { font-size:11px; color:var(--text3); display:block; margin-bottom:2px; }
.loc-cfg-grid input { width:100%; padding:5px 6px; font-size:12px; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; box-sizing:border-box; outline:none; }
.loc-poi-section { margin-top:12px; }
.loc-poi-category h5 { font-size:13px; color:var(--text); margin:8px 0 4px; }
.poi-count { font-size:11px; color:var(--text3); }
.loc-poi-list { display:flex; flex-direction:column; gap:4px; }
.loc-poi-item { display:flex; gap:8px; padding:6px 4px; border-bottom:1px solid var(--border); }
.loc-poi-item:last-child { border-bottom:none; }
.loc-poi-thumb { width:40px; height:40px; border-radius:6px; object-fit:cover; flex-shrink:0; }
.loc-poi-thumb-placeholder { width:40px; height:40px; border-radius:6px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.loc-poi-info { flex:1; min-width:0; }
.loc-poi-name { font-size:13px; font-weight:600; }
.loc-poi-meta { font-size:11px; color:var(--text2); margin-top:1px; }
.loc-poi-addr { font-size:11px; color:var(--text3); margin-top:1px; }
.poi-rating { color:#f59e0b; }
.poi-cost { color:#ef4444; }
.loc-poi-empty { padding:16px; text-align:center; color:var(--text3); font-size:13px; }
</style>
</head>
<body>
<div class="sub-page">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='/'">⬅</button>
    <h2>📍 定位地图</h2>
  </div>
  <div class="page-content">
    <!-- 状态概览 -->
    <div class="loc-panel-status">
      <div class="loc-stat"><span class="loc-stat-label">状态</span> <span class="loc-stat-val" id="lpState">--</span></div>
      <div class="loc-stat"><span class="loc-stat-label">位置</span> <span class="loc-stat-val" id="lpAddr">--</span></div>
      <div class="loc-stat"><span class="loc-stat-label">距家</span> <span class="loc-stat-val" id="lpDist">--</span></div>
      <div class="loc-stat"><span class="loc-stat-label">天气</span> <span class="loc-stat-val" id="lpWeather">--</span></div>
      <div class="loc-stat"><span class="loc-stat-label">更新</span> <span class="loc-stat-val" id="lpTime">--</span></div>
    </div>
    <!-- 配置区 -->
    <div class="loc-cfg-section">
      <h4 onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('span').textContent=this.nextElementSibling.style.display==='none'?'▶':'▼'">⚙ 配置 <span>▼</span></h4>
      <div id="locCfgBody">
        <div class="loc-cfg-row">
          <label><input type="checkbox" id="lp_enabled" style="accent-color:var(--accent)"> 启用定位</label>
          <label><input type="checkbox" id="lp_quiet" style="accent-color:var(--accent)"> 静默时段</label>
          <input type="time" id="lp_qstart" value="00:00" style="width:70px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:11px">
          <span style="color:var(--text3);font-size:11px">~</span>
          <input type="time" id="lp_qend" value="08:00" style="width:70px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:11px">
        </div>
        <div style="margin-bottom:6px">
          <label style="font-size:11px;color:var(--text3)">高德 Web服务 API Key</label>
          <input type="text" id="lp_amap_key" placeholder="32位十六进制" autocomplete="off" class="form-input" style="font-size:12px;padding:5px 6px">
        </div>
        <div class="loc-cfg-grid">
          <div><label>家经度</label><input type="text" id="lp_home_lng" placeholder="经度" autocomplete="off"></div>
          <div><label>家纬度</label><input type="text" id="lp_home_lat" placeholder="纬度" autocomplete="off"></div>
          <div><label>离家阈值(m)</label><input type="number" id="lp_threshold" placeholder="500" autocomplete="off"></div>
          <div><label>POI半径(m)</label><input type="number" id="lp_poi_radius" placeholder="2000" autocomplete="off"></div>
        </div>
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="btn-save" style="font-size:11px;padding:4px 10px;flex:1" onclick="saveLocPanel()">💾 保存配置</button>
          <button class="btn-save" style="font-size:11px;padding:4px 10px;flex:1;background:var(--surface2);color:var(--text)" onclick="setHomeLoc()">📍 用当前定位设为家</button>
        </div>
        <div id="lpCfgMsg" style="font-size:11px;color:var(--text2);margin-top:4px"></div>
      </div>
    </div>
    <!-- POI 列表 -->
    <div class="loc-poi-section">
      <h4 style="margin:0 0 8px;font-size:13px;color:var(--accent)">📌 周边 POI</h4>
      <div id="locPoiContent"><div class="loc-poi-empty">暂无 POI 数据（外出时自动搜索）</div></div>
    </div>
  </div>
</div>
<script src="/static/common.js"></script>
<script>
connectCommonWS(msg => {
  if (msg.type === "location_update" && msg.data) {
    updateLocPanelStatus(msg.data);
    if (msg.data.nearby_pois) renderLocPois(msg.data.nearby_pois);
  }
});

(async function init() {
  await loadLocPanel();
})();

async function loadLocPanel() {
  try {
    const loc = await api("GET", "/api/location/config");
    $("lp_enabled").checked = loc.enabled || false;
    $("lp_amap_key").value = loc.amap_key || "";
    $("lp_home_lng").value = (loc.home_lng && loc.home_lat) ? loc.home_lng : "";
    $("lp_home_lat").value = (loc.home_lng && loc.home_lat) ? loc.home_lat : "";
    $("lp_threshold").value = loc.home_threshold || 500;
    $("lp_poi_radius").value = loc.poi_radius || 2000;
    $("lp_quiet").checked = loc.quiet_hours_enabled || false;
    $("lp_qstart").value = loc.quiet_hours_start || "00:00";
    $("lp_qend").value = loc.quiet_hours_end || "08:00";
  } catch(e){}
  try {
    const s = await api("GET", "/api/location/status");
    updateLocPanelStatus(s);
    renderLocPois(s.nearby_pois || {});
  } catch(e){}
}

function updateLocPanelStatus(s) {
  if (!s || !s.lng) { $("lpState").textContent = "未知"; return; }
  const stateMap = {at_home:"🏠 在家", outside:"🚶 外出", unknown:"❓ 未知"};
  $("lpState").textContent = stateMap[s.state] || s.state;
  $("lpAddr").textContent = s.address || "--";
  if (s.distance_from_home > 0) { const d = s.distance_from_home; $("lpDist").textContent = d >= 1000 ? (d/1000).toFixed(1)+'km' : Math.round(d)+'m'; } else { $("lpDist").textContent = "--"; }
  if (s.weather && s.weather.weather) $("lpWeather").textContent = `${s.weather.weather} ${s.weather.temperature}°C`; else $("lpWeather").textContent = "--";
  if (s.updated_at) $("lpTime").textContent = new Date(s.updated_at * 1000).toLocaleTimeString(); else $("lpTime").textContent = "--";
}

function renderLocPois(pois) {
  const el = $("locPoiContent");
  if (!pois || !Object.keys(pois).length) { el.innerHTML = '<div class="loc-poi-empty">暂无 POI 数据（外出时自动搜索）</div>'; return; }
  const typeIcons = {"餐饮美食":"🍜","风景名胜":"🏞️","休闲娱乐":"🎮","购物":"🛒","酒店住宿":"🏨","生活服务":"🔧"};
  let html = '';
  for (const [category, items] of Object.entries(pois)) {
    if (!items || !items.length) continue;
    const icon = typeIcons[category] || "📍";
    html += `<div class="loc-poi-category"><h5>${icon} ${escHtml(category)} <span class="poi-count">(${items.length})</span></h5><div class="loc-poi-list">`;
    for (const p of items) {
      const dist = p.distance ? `${parseInt(p.distance)}m` : '';
      const photoUrl = (p.photos && p.photos.length) ? p.photos[0] : '';
      const thumb = photoUrl ? `<img class="loc-poi-thumb" src="${escHtml(photoUrl)}" alt="" onerror="this.outerHTML='<div class=\\'loc-poi-thumb-placeholder\\'>📍</div>'">` : '<div class="loc-poi-thumb-placeholder">📍</div>';
      let meta = '';
      if (dist) meta += dist;
      if (p.rating && p.rating !== '[]') meta += (meta ? ' · ' : '') + `<span class="poi-rating">⭐${p.rating}</span>`;
      if (p.cost && p.cost !== '[]') meta += (meta ? ' · ' : '') + `<span class="poi-cost">¥${p.cost}</span>`;
      if (p.tel) meta += (meta ? ' · ' : '') + `📞${p.tel}`;
      html += `<div class="loc-poi-item">${thumb}<div class="loc-poi-info"><div class="loc-poi-name">${escHtml(p.name)}</div><div class="loc-poi-meta">${meta}</div>${p.address && p.address !== '[]' ? `<div class="loc-poi-addr">${escHtml(p.address)}</div>` : ''}</div></div>`;
    }
    html += '</div></div>';
  }
  el.innerHTML = html;
}

async function saveLocPanel() {
  try {
    const body = { enabled: $("lp_enabled").checked, quiet_hours_enabled: $("lp_quiet").checked, quiet_hours_start: $("lp_qstart").value, quiet_hours_end: $("lp_qend").value };
    const ak = $("lp_amap_key").value.trim(); if (ak) body.amap_key = ak;
    const hlng = parseFloat($("lp_home_lng").value); const hlat = parseFloat($("lp_home_lat").value);
    if (!isNaN(hlng)) body.home_lng = hlng; if (!isNaN(hlat)) body.home_lat = hlat;
    const ht = parseInt($("lp_threshold").value); if (!isNaN(ht)) body.home_threshold = ht;
    const pr = parseInt($("lp_poi_radius").value); if (!isNaN(pr)) body.poi_radius = pr;
    await api("PUT", "/api/location/config", body);
    $("lpCfgMsg").textContent = "✅ 已保存";
    setTimeout(() => $("lpCfgMsg").textContent = "", 2000);
  } catch(e) { $("lpCfgMsg").textContent = "❌ " + e.message; }
}

async function setHomeLoc() {
  try {
    const r = await api("POST", "/api/location/set-home");
    if (r.ok) { $("lp_home_lng").value = r.home_lng; $("lp_home_lat").value = r.home_lat; $("lpCfgMsg").textContent = "✅ 已设为家：" + (r.address || `${r.home_lng},${r.home_lat}`); return; }
  } catch(e){}
  if (!navigator.geolocation) { alert("浏览器不支持定位"); return; }
  $("lpCfgMsg").textContent = "📡 正在获取浏览器定位...";
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      try {
        await api("POST", "/api/location/heartbeat", {lng:pos.coords.longitude, lat:pos.coords.latitude, accuracy:pos.coords.accuracy, is_gcj02:false, force:true});
        const r = await api("POST", "/api/location/set-home");
        if (r.ok) { $("lp_home_lng").value = r.home_lng; $("lp_home_lat").value = r.home_lat; $("lpCfgMsg").textContent = "✅ 已设为家：" + (r.address || `${r.home_lng},${r.home_lat}`); loadLocPanel(); }
        else { $("lpCfgMsg").textContent = "❌ " + (r.error || "设置失败"); }
      } catch(e) { $("lpCfgMsg").textContent = "❌ " + e.message; }
    },
    (err) => { $("lpCfgMsg").textContent = "❌ 定位失败，请手动输入坐标"; },
    {enableHighAccuracy:true, timeout:15000}
  );
}
</script>
</body>
</html>
