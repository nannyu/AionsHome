<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>世界书 - Aion</title>
<link rel="stylesheet" href="/static/common.css">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff8359">
</head>
<body>
<div class="sub-page">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='/'">⬅</button>
    <h2>📖 世界书</h2>
  </div>
  <div class="page-content">
    <label class="form-label">AI 名字</label>
    <input class="form-input" type="text" id="wbAiName" placeholder="默认：AI" autocomplete="off">
    <label class="form-label">用户名字</label>
    <input class="form-input" type="text" id="wbUserName" placeholder="默认：你" autocomplete="off">
    <label class="form-label">AI 人设</label>
    <div class="form-hint">设定 AI 的性格、角色、行为规则等</div>
    <textarea class="form-input" id="wbAiPersona" placeholder="例如：你是一个叫小星的AI助手，语气活泼可爱..."></textarea>
    <label class="form-label">用户人设</label>
    <div class="form-hint">关于你自己的信息，AI 会以此为参考</div>
    <textarea class="form-input" id="wbUserPersona" placeholder="例如：我叫小明，喜欢编程和游戏..."></textarea>
    <div class="btn-row">
      <button class="btn-cancel" onclick="location.href='/'">取消</button>
      <button class="btn-save" onclick="saveWorldBook()">保存</button>
    </div>
  </div>
</div>
<script src="/static/common.js"></script>
<script>
connectCommonWS();

(async function init() {
  const wb = await api("GET", "/api/worldbook");
  $("wbAiName").value = wb.ai_name || "";
  $("wbUserName").value = wb.user_name || "";
  $("wbAiPersona").value = wb.ai_persona || "";
  $("wbUserPersona").value = wb.user_persona || "";
})();

async function saveWorldBook() {
  const wb = {
    ai_name: $("wbAiName").value.trim() || "AI",
    user_name: $("wbUserName").value.trim() || "你",
    ai_persona: $("wbAiPersona").value,
    user_persona: $("wbUserPersona").value
  };
  await api("PUT", "/api/worldbook", wb);
  showToast("✅ 世界书已保存");
}
</script>
</body>
</html>
