<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日程管理 - Aion</title>
<link rel="stylesheet" href="/static/common.css">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff8359">
<style>
.sch-list { border:1px solid var(--border); border-radius:8px; background:var(--bg); padding:4px; max-height:calc(100dvh - 300px); overflow-y:auto; }
.sch-item { display:flex; align-items:flex-start; gap:8px; padding:10px 8px; border-bottom:1px solid var(--border); }
.sch-item:last-child { border-bottom:none; }
.sch-icon { font-size:18px; flex-shrink:0; margin-top:2px; }
.sch-body { flex:1; min-width:0; }
.sch-content { font-size:14px; color:var(--text); word-break:break-word; }
.sch-type { font-size:10px; padding:1px 6px; border-radius:4px; margin-left:6px; }
.sch-type.alarm { background:#fff3e0; color:#e65100; }
.sch-type.reminder { background:#e3f2fd; color:#1565c0; }
.sch-type.monitor { background:#f3e5f5; color:#7b1fa2; }
.sch-time { font-size:11px; color:var(--text3); margin-top:2px; }
.sch-del-btn { background:none; border:none; color:var(--danger); font-size:14px; cursor:pointer; padding:4px; opacity:0.6; flex-shrink:0; }
.sch-del-btn:hover { opacity:1; }
.sch-empty { padding:24px; text-align:center; color:var(--text3); font-size:14px; }
.sch-add-section { margin-top:12px; }
.sch-add-section input[type="text"] { width:100%; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:13px; outline:none; margin-bottom:8px; box-sizing:border-box; }
.sch-add-row2 { display:flex; gap:6px; align-items:center; }
.sch-add-row2 input { flex:1; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:6px 8px; font-size:12px; outline:none; min-width:0; }
.sch-add-row2 select { padding:6px 8px; border:1px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:12px; flex-shrink:0; }
.sch-add-row2 button { padding:8px 14px; border:none; border-radius:8px; background:var(--accent); color:#fff; font-size:13px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
</style>
</head>
<body>
<div class="sub-page">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='/'">⬅</button>
    <h2>📅 日程管理</h2>
  </div>
  <div class="page-content">
    <div class="sch-list" id="schList"><div class="sch-empty">暂无日程</div></div>
    <div class="sch-add-section">
      <input type="text" id="schAddContent" placeholder="日程内容...">
      <div class="sch-add-row2">
        <input type="datetime-local" id="schAddTime">
        <select id="schAddType">
          <option value="alarm">🔔 闹铃</option>
          <option value="reminder">📋 日程</option>
          <option value="monitor">👁 监督</option>
        </select>
        <button onclick="addScheduleManual()">添加</button>
      </div>
    </div>
  </div>
</div>
<script src="/static/common.js"></script>
<script>
connectCommonWS(msg => {
  if (msg.type === "schedule_changed") loadSchedules();
});

(async function init() {
  await loadSchedules();
})();

async function loadSchedules() {
  try {
    const list = await api("GET", "/api/schedules?status=active");
    const el = $("schList");
    if (!list || !list.length) { el.innerHTML = '<div class="sch-empty">暂无日程</div>'; return; }
    el.innerHTML = list.map(s => {
      const typeMap = {alarm:['🔔','闹铃','alarm'], reminder:['📋','日程','reminder'], monitor:['👁','监督','monitor']};
      const [icon, label, cls] = typeMap[s.type] || typeMap.reminder;
      return `<div class="sch-item">
        <span class="sch-icon">${icon}</span>
        <div class="sch-body">
          <div><span class="sch-content">${escHtml(s.content)}</span><span class="sch-type ${cls}">${label}</span></div>
          <div class="sch-time">${escHtml((s.trigger_at||'').replace('T',' '))}</div>
        </div>
        <button class="sch-del-btn" onclick="deleteSchedule('${s.id}')" title="删除">✕</button>
      </div>`;
    }).join('');
  } catch(e) { console.error("loadSchedules:", e); }
}

async function addScheduleManual() {
  const content = $("schAddContent").value.trim();
  const triggerAt = $("schAddTime").value;
  const type = $("schAddType").value;
  if (!content || !triggerAt) { alert("请填写内容和时间"); return; }
  try {
    await api("POST", "/api/schedules", { type, trigger_at: triggerAt, content });
    $("schAddContent").value = "";
    $("schAddTime").value = "";
    loadSchedules();
    showToast("✅ 已添加");
  } catch(e) { alert("添加失败：" + e.message); }
}

async function deleteSchedule(id) {
  if (!confirm("确定删除此日程？")) return;
  try {
    await api("DELETE", `/api/schedules/${id}`);
    loadSchedules();
  } catch(e) { alert("删除失败：" + e.message); }
}
</script>
</body>
</html>
